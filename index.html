<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2c5530">
<title>MS Cookbook Vote</title>
<style>
  :root {
    --bg: #faf7f2;
    --card-bg: #fff;
    --border: #e5e0d8;
    --accent: #2c5530;
    --accent-light: #d4e3d2;
    --text: #1a1a1a;
    --muted: #666;
    --in-box: #d4a017;
    --cat-chicken: #f4c430;
    --cat-beef: #d64545;
    --cat-other: #3b82f6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 110px;
  }
  header {
    padding: 18px 16px 12px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  h1 { font-size: 19px; margin: 0 0 4px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .legend {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 12.5px;
    padding: 10px 16px 0;
  }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .slot { margin: 16px 12px 8px; }
  main { padding-top: 4px; }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.08s, box-shadow 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: stretch;
  }
  .card:active { transform: scale(0.995); }
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-light) inset;
  }

  /* Narrow colored category strip */
  .cat-strip {
    width: 30px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .cat-chicken .cat-strip { background: var(--cat-chicken); }
  .cat-beef .cat-strip { background: var(--cat-beef); }
  .cat-other .cat-strip { background: var(--cat-other); }

  /* Middle: photo + text */
  .card-mid {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #e7decd 0%, #d3c7b3 100%);
    overflow: hidden;
  }
  .thumb {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: opacity 0.3s;
  }
  .thumb.loading { opacity: 0; }
  .check {
    position: absolute;
    top: 8px; right: 8px;
    width: 30px; height: 30px;
    border: 2px solid #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: bold;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    font-size: 16px; z-index: 2;
    transition: background 0.15s, transform 0.15s;
  }
  .selected .check {
    background: var(--accent);
    transform: scale(1.08);
  }
  .star-pill {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--in-box);
    color: #fff;
    padding: 3px 9px 3px 7px;
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    z-index: 2;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .card-text { padding: 9px 11px 11px; }
  .card-title { font-weight: 600; font-size: 15px; line-height: 1.25; margin: 0 0 3px; }
  .card-subtitle { color: var(--muted); font-size: 13px; line-height: 1.35; margin: 0 0 7px; }
  .card-meta {
    display: flex; flex-wrap: wrap; gap: 5px;
    align-items: center; font-size: 11.5px; color: var(--muted);
  }
  .badge {
    background: #f0ebe2; padding: 2px 7px;
    border-radius: 999px; color: #5a4a30; white-space: nowrap;
  }

  /* Right: always-on ingredients, 2 columns */
  .card-ing {
    flex: 0 0 44%;
    max-width: 250px;
    min-width: 140px;
    border-left: 1px solid var(--border);
    background: #fffdf8;
    padding: 9px 10px;
    overflow: hidden;
  }
  .ing-head {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--muted); margin-bottom: 6px;
  }
  .ing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px 8px;
  }
  .ing-grid.single { grid-template-columns: 1fr; }
  .ing-item {
    font-size: 11px;
    line-height: 1.3;
    color: #5a4a30;
    padding: 1px 0;
    overflow-wrap: anywhere;
  }
  .ing-item::before { content: "• "; color: #c9b48a; }

  .send-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; align-items: center;
  }
  .send-btn {
    flex: 1; padding: 14px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .send-btn:disabled { background: #ccc; cursor: default; }
  .clear-btn {
    padding: 14px 18px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    font-size: 14px; cursor: pointer;
  }
  .toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a1a; color: #fff;
    padding: 12px 20px; border-radius: 999px;
    font-size: 14px; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .menu-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .menu-link:active { opacity: 0.6; }
  .extras {
    margin: 8px 12px 24px;
    background: #fff;
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 14px;
  }
  .extras-head { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .extras-sub { font-size: 12.5px; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
  .extras-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .extra-chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accent-light);
    border: 1px solid var(--accent);
    color: #1d3a20;
    padding: 6px 8px 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }
  .extra-chip button {
    border: none; background: rgba(0,0,0,0.12);
    color: #1d3a20; width: 20px; height: 20px;
    border-radius: 50%; cursor: pointer;
    font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .extra-select {
    width: 100%;
    padding: 12px 10px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    -webkit-appearance: menulist;
    appearance: menulist;
  }
  @media (min-width: 760px) {
    body { max-width: 760px; margin: 0 auto; }
    .send-bar { max-width: 760px; left: 50%; transform: translateX(-50%); }
  }
</style>
</head>
<body>
<header>
  <h1>Marley Spoon — Pick Your Favorites</h1>
  <div class="subtitle" id="weekof">Loading…</div>
  <a id="menulink" class="menu-link" target="_blank" rel="noopener" style="display:none">🔗 Browse the full Marley Spoon menu →</a>
</header>
<main id="slots"></main>
<section id="extras-section" class="extras" style="display:none">
  <div class="extras-head">➕ Add other dishes</div>
  <div class="extras-sub">Not in the list above? Pick anything off the full menu (vegan, etc.). Add as many as you want.</div>
  <div id="extras-chips" class="extras-chips"></div>
  <div id="extras-picker"></div>
</section>
<div class="send-bar">
  <button class="clear-btn" id="clear">Clear</button>
  <button class="send-btn" id="send" disabled>Send (0)</button>
</div>
<div class="toast" id="toast"></div>
<script>
  const STATE_KEY = 'ms-vote-selections';
  const EXTRAS_KEY = 'ms-vote-extras';
  const CAT_LABEL = { chicken: '🐔 Chicken', beef: '🥩 Beef', other: '🐟 Other' };
  const CAT_EMOJI = { chicken: '🐔', beef: '🥩', other: '🐟' };
  let DATA = null;
  let selections = new Set(JSON.parse(localStorage.getItem(STATE_KEY) || '[]'));
  let extras = JSON.parse(localStorage.getItem(EXTRAS_KEY) || '[]');

  fetch('current.json?v=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      DATA = data;
      document.getElementById('weekof').textContent = 'Week of ' + (data.displayDate || data.weekOf);
      const validIds = new Set();
      data.slots.forEach(s => s.recipes.forEach((_, i) => validIds.add(s.id + '-' + i)));
      const before = selections.size;
      selections = new Set([...selections].filter(id => validIds.has(id)));
      if (selections.size !== before) saveState();
      // Menu link
      if (data.menuUrl) {
        const ml = document.getElementById('menulink');
        ml.href = data.menuUrl;
        ml.style.display = 'inline-block';
      }
      render();
      renderExtras();
    })
    .catch(err => {
      document.getElementById('slots').innerHTML =
        '<p style="padding:20px;color:#c00;text-align:center">Could not load list: ' + err.message + '</p>';
    });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  function render() {
    const root = document.getElementById('slots');
    root.innerHTML = '';
    DATA.slots.forEach(slot => {
      const sec = document.createElement('section');
      sec.className = 'slot';
      slot.recipes.forEach((recipe, i) => {
        const id = slot.id + '-' + i;
        const selected = selections.has(id);
        const cat = recipe.cat || 'other';
        const card = document.createElement('div');
        card.className = 'card cat-' + cat + (selected ? ' selected' : '');
        card.dataset.id = id;
        const badges = (recipe.badges || []).map(b => `<span class="badge">${escapeHtml(b)}</span>`).join('');
        const thumb = recipe.image
          ? `<img class="thumb loading" loading="lazy" alt="${escapeHtml(recipe.title)}" src="${escapeHtml(recipe.image)}" onload="this.classList.remove('loading')" onerror="this.style.display='none'">`
          : '';
        const ings = recipe.ingredients || [];
        const gridCls = ings.length <= 4 ? 'ing-grid single' : 'ing-grid';
        card.innerHTML = `
          <div class="cat-strip" title="${escapeHtml(cat)}">${escapeHtml(recipe.emoji || CAT_EMOJI[cat] || '')}</div>
          <div class="card-mid">
            <div class="thumb-wrap">
              ${thumb}
              ${recipe.inBox ? '<div class="star-pill">★ In box</div>' : ''}
              <div class="check">${selected ? '✓' : ''}</div>
            </div>
            <div class="card-text">
              <div class="card-title">${escapeHtml(recipe.title)}</div>
              ${recipe.subtitle ? `<div class="card-subtitle">${escapeHtml(recipe.subtitle)}</div>` : ''}
              <div class="card-meta">
                ${recipe.time ? `<span>${escapeHtml(recipe.time)}</span>` : ''}
                ${recipe.cuisine ? `<span>· ${escapeHtml(recipe.cuisine)}</span>` : ''}
                ${badges}
              </div>
            </div>
          </div>
          ${ings.length ? `
            <div class="card-ing">
              <div class="ing-head">Ingredients (${ings.length})</div>
              <div class="${gridCls}">
                ${ings.map(ing => `<div class="ing-item">${escapeHtml(ing)}</div>`).join('')}
              </div>
            </div>` : ''}
        `;
        card.addEventListener('click', () => toggle(id, card));
        sec.appendChild(card);
      });
      root.appendChild(sec);
    });
    updateSendBtn();
  }

  function toggle(id, card) {
    if (selections.has(id)) {
      selections.delete(id);
      card.classList.remove('selected');
      card.querySelector('.check').textContent = '';
    } else {
      selections.add(id);
      card.classList.add('selected');
      card.querySelector('.check').textContent = '✓';
    }
    saveState();
    updateSendBtn();
  }

  function saveState() {
    localStorage.setItem(STATE_KEY, JSON.stringify([...selections]));
  }

  function saveExtras() {
    localStorage.setItem(EXTRAS_KEY, JSON.stringify(extras));
  }

  function renderExtras() {
    if (!DATA || !Array.isArray(DATA.allDishes) || !DATA.allDishes.length) return;
    document.getElementById('extras-section').style.display = 'block';

    // chips for already-added extras
    const chipWrap = document.getElementById('extras-chips');
    chipWrap.innerHTML = extras.map((name, idx) =>
      `<span class="extra-chip">${escapeHtml(name)}<button data-rm="${idx}" aria-label="Remove">✕</button></span>`
    ).join('');
    chipWrap.querySelectorAll('button[data-rm]').forEach(btn => {
      btn.addEventListener('click', () => {
        extras.splice(Number(btn.dataset.rm), 1);
        saveExtras();
        renderExtras();
        updateSendBtn();
      });
    });

    // a fresh dropdown to add the next one (dishes not already added)
    const remaining = DATA.allDishes.filter(d => !extras.includes(d));
    const picker = document.getElementById('extras-picker');
    if (!remaining.length) { picker.innerHTML = ''; return; }
    const sel = document.createElement('select');
    sel.className = 'extra-select';
    sel.innerHTML =
      `<option value="" selected disabled>+ Add a dish from the full menu…</option>` +
      remaining.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
    sel.addEventListener('change', () => {
      if (sel.value) {
        extras.push(sel.value);
        saveExtras();
        renderExtras();
        updateSendBtn();
      }
    });
    picker.innerHTML = '';
    picker.appendChild(sel);
  }

  function updateSendBtn() {
    const btn = document.getElementById('send');
    const count = selections.size + extras.length;
    btn.textContent = `Send (${count})`;
    btn.disabled = count === 0;
  }

  function showToast(msg, ms = 2400) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  document.getElementById('clear').addEventListener('click', () => {
    if (selections.size === 0 && extras.length === 0) return;
    if (!confirm('Clear all selections?')) return;
    selections.clear();
    extras = [];
    saveState();
    saveExtras();
    render();
    renderExtras();
    updateSendBtn();
  });

  document.getElementById('send').addEventListener('click', async () => {
    const all = [];
    DATA.slots.forEach(slot => {
      slot.recipes.forEach((r, i) => {
        const id = slot.id + '-' + i;
        if (selections.has(id)) all.push({ ...r, cat: r.cat || 'other' });
      });
    });
    const lines = [`Marley Spoon picks — week of ${DATA.displayDate || DATA.weekOf}`, ''];
    ['chicken','beef','other'].forEach(c => {
      const picks = all.filter(r => r.cat === c);
      if (!picks.length) return;
      lines.push(`${CAT_LABEL[c]} (${picks.length})`);
      picks.forEach(p => lines.push(`  ✓ ${p.title}`));
      lines.push('');
    });
    if (extras.length) {
      lines.push(`➕ Added from full menu (${extras.length})`);
      extras.forEach(n => lines.push(`  ✓ ${n}`));
      lines.push('');
    }
    const text = lines.join('\n').trim();

    if (navigator.share) {
      try { await navigator.share({ title: 'MS picks', text }); return; }
      catch (e) { if (e.name === 'AbortError') return; }
    }
    fallback(text);
  });

  function fallback(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        () => showToast('Copied to clipboard — paste it into a text!', 3000),
        () => mailtoFallback(text)
      );
    } else {
      mailtoFallback(text);
    }
  }

  function mailtoFallback(text) {
    window.location.href = 'mailto:?subject=MS%20picks&body=' + encodeURIComponent(text);
  }
</script>
</body>
</html>
